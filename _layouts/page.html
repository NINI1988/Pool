---
layout: default
---
<article class="page-shell">
  <header class="page-header">
    {% if page.kicker %}
      <p class="eyebrow">{{ page.kicker }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</article>
