<!doctype html>
<html lang="{{ site.lang | default: 'de' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="icon" href="{{ '/assets/images/logo.jpg' | relative_url }}">
  </head>
  <body>
    {% include header.html %}
    {% unless page.layout == 'home' %}
      <section class="subhero" aria-hidden="true"></section>
    {% endunless %}
    <main id="content">
      {% include baseurl-content.html content=content %}
    </main>
    {% include footer.html %}
  </body>
</html>
