---
layout: default
---
<article class="page-shell">
  <header class="page-header">
    <p class="eyebrow">{{ page.date | date: "%d.%m.%Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</article>
